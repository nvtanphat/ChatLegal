version: "3.9"

services:
  app:
    build: .
    container_name: vn-law-chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - hf_models:/root/.cache/huggingface
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - HF_HOME=/root/.cache/huggingface
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: vn-law-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  hf_models:
